<script type="text/javascript">
    window.$crisp=[];
    window.CRISP_WEBSITE_ID="06682cb4-0c18-4142-bb07-501508bd98de";
    (function(){d=document;s=d.createElement("script");s.src="https://client.crisp.chat/l.js";s.async=1;d.getElementsByTagName("head")[0].appendChild(s);})();

    // 1. Kural: Daha sayfa yüklenirken butonu gizle (Kalıcı yapılandırma)
    $crisp.push(["set", "chat:display:none", [true]]); 

    // 2. Kural: Crisp motoru hazır olduğunda hemen saklan (Preloader sonrası çıkışı engeller)
    $crisp.push(["on", "session:loaded", function(){
        $crisp.push(['do', 'chat:hide']);
    }]);

    // 3. Kural: Chat penceresi her kapandığında butonu tekrar gizle
    $crisp.push(["on", "chat:closed", function() {
        $crisp.push(['do', 'chat:hide']);
    }]);

    // Senin kendi butonun için tetikleyici fonksiyon
    function openCustomChat() { 
        $crisp.push(['do', 'chat:show']); // Önce görünür yap
        $crisp.push(['do', 'chat:open']); // Sonra aç
    }
</script>
